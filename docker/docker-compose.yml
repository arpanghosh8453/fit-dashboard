services:
  fit-dashboard:
    image: ghcr.io/arpanghosh8453/fit-dashboard:latest
    container_name: fit-dashboard
    command: ["sh", "-c", "rm -f /etc/nginx/sites-enabled/default /etc/nginx/sites-available/default && exec /usr/local/bin/start-fit-dashboard.sh"]
    restart: unless-stopped
    ports:
      - "8088:80"
    volumes:
      - fit_dashboard_data:/data
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - FIT_DASHBOARD_DOCKER=1
      - FIT_DASHBOARD_DATA_DIR=/data
      - FIT_DASHBOARD_DB=/data/fit-dashboard.duckdb
      - FIT_DASHBOARD_SESSION_TTL=${FIT_DASHBOARD_SESSION_TTL:-72h}
      - RUST_LOG=${RUST_LOG:-info,fit_dashboard_core=debug,hyper=warn,h2=warn}

volumes:
  fit_dashboard_data:
