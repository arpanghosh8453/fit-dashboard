name: Desktop Build and Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish assets to (defaults to latest release tag)
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      release_id: ${{ steps.tag.outputs.release_id }}
    steps:
      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            RELEASE_ID="${{ github.event.release.id }}"
            echo "Using release event tag: $TAG"
          elif [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
            RELEASE_ID=$(gh release view "$TAG" --repo "${{ github.repository }}" --json databaseId -q '.databaseId' || true)
            if [ -z "$RELEASE_ID" ]; then
              echo "::error::Release not found for input tag $TAG"
              exit 1
            fi
            echo "Using manual input tag: $TAG"
          else
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName' || true)
            if [ -z "$TAG" ]; then
              echo "::error::No release tag found. Provide workflow_dispatch input tag or publish a release first."
              exit 1
            fi
            RELEASE_ID=$(gh release view --repo "${{ github.repository }}" --json databaseId -q '.databaseId' || true)
            if [ -z "$RELEASE_ID" ]; then
              echo "::error::Unable to resolve latest release id"
              exit 1
            fi
            echo "Using latest release tag: $TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve-tag
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Ensure tauri npm script exists (tag compatibility)
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='package.json';const j=JSON.parse(fs.readFileSync(p,'utf8'));j.scripts=j.scripts||{};if(!j.scripts.tauri){j.scripts.tauri='tauri';fs.writeFileSync(p,JSON.stringify(j,null,2)+'\\n');console.log('Added scripts.tauri for CI compatibility');}else{console.log('scripts.tauri already present');}"

      - name: Verify tauri script
        run: npm run tauri -- --version

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            rpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure static MSVC runtime (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          {
            echo "RUSTFLAGS=-C target-feature=+crt-static"
            echo "CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded"
          } >> "$GITHUB_ENV"

      - name: Delete stale release assets for current target
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
          RELEASE_ID: ${{ needs.resolve-tag.outputs.release_id }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail

          case "$TARGET" in
            aarch64-apple-darwin)
              PLATFORM="darwin"
              ARCH_REGEX="aarch64|arm64"
              ;;
            x86_64-apple-darwin)
              PLATFORM="darwin"
              ARCH_REGEX="x64|x86_64|amd64"
              ;;
            x86_64-unknown-linux-gnu)
              PLATFORM="linux"
              ARCH_REGEX="x64|x86_64|amd64"
              ;;
            x86_64-pc-windows-msvc)
              PLATFORM="windows"
              ARCH_REGEX="x64|x86_64|amd64"
              ;;
            *)
              echo "Unknown target $TARGET; skipping stale asset cleanup"
              exit 0
              ;;
          esac

          echo "Scanning release $TAG (id=$RELEASE_ID) for stale assets (platform=$PLATFORM, arch_regex=$ARCH_REGEX)"

          MATCHED=$(gh api "repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?per_page=100" \
            --jq ".[] | select(.name | test(\"^fit-dashboard_.*_${PLATFORM}_(${ARCH_REGEX})(\\\\.|$)\"; \"i\")) | \"\\(.id)\\t\\(.name)\"" || true)

          if [ -z "$MATCHED" ]; then
            echo "No stale assets found for ${PLATFORM}/${TARGET}"
            exit 0
          fi

          echo "Matched stale release assets:"
          while IFS=$'\t' read -r id name; do
            [ -z "$id" ] && continue
            echo "- id=$id name=$name"
          done <<< "$MATCHED"

          IDS=$(printf '%s\n' "$MATCHED" | awk -F $'\t' '{print $1}')

          while IFS= read -r id; do
            [ -z "$id" ] && continue
            if ! [[ "$id" =~ ^[0-9]+$ ]]; then
              echo "Skipping non-numeric asset id=$id"
              continue
            fi
            gh api \
              --method DELETE \
              "repos/${{ github.repository }}/releases/assets/$id"
            echo "Deleted stale asset id=$id"
          done <<< "$IDS"

      - name: Build and upload release assets (Linux)
        if: runner.os == 'Linux'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          includeRelease: true
          releaseDraft: false
          prerelease: false
          uploadPlainBinary: false
          assetNamePattern: 'fit-dashboard_[version]_[platform]_[arch].[ext]'
          args: --target ${{ matrix.target }} --bundles deb,rpm,appimage --verbose

      - name: Build and upload release assets (macOS)
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          includeRelease: true
          releaseDraft: false
          prerelease: false
          uploadPlainBinary: false
          assetNamePattern: 'fit-dashboard_[version]_[platform]_[arch].[ext]'
          args: --target ${{ matrix.target }} --bundles dmg --verbose

      - name: Build and upload release assets (Windows nsis + msi)
        if: runner.os == 'Windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          includeRelease: true
          releaseDraft: false
          prerelease: false
          uploadPlainBinary: false
          assetNamePattern: 'fit-dashboard_[version]_[platform]_[arch].[ext]'
          args: --target ${{ matrix.target }} --bundles nsis,msi --verbose

  checksums:
    needs: [resolve-tag, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          mkdir assets
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --dir assets \
            --pattern '*.deb' \
            --pattern '*.rpm' \
            --pattern '*.AppImage' \
            --pattern '*.dmg' \
            --pattern '*.exe' \
            --pattern '*.msi' \
            --pattern '*.nsis.zip' \
            --pattern 'fit-dashboard_*'

      - name: Generate checksums
        run: |
          cd assets
          sha256sum * | sort -k2 > ../checksums.txt
          echo "Generated checksums:"
          cat ../checksums.txt

      - name: Upload checksums to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
        run: |
          gh release upload "$TAG" checksums.txt \
            --repo "${{ github.repository }}" \
            --clobber
